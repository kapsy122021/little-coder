name: little-coder

services:
  little-coder:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: little-coder
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      OPEN_TERMINAL_URL: http://open-terminal:8000
      OPEN_TERMINAL_API_KEY: ${OPEN_TERMINAL_API_KEY}
    networks:
      - little-coder-net
    pids_limit: 256
    mem_limit: 2g
    cpus: 2
    depends_on:
      - open-terminal

  open-terminal:
    image: ghcr.io/open-webui/open-terminal:slim
    container_name: open-terminal
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      OPEN_TERMINAL_API_KEY: ${OPEN_TERMINAL_API_KEY}
      OPEN_TERMINAL_MULTI_USER: "false"
    networks:
      - little-coder-net
    pids_limit: 256
    mem_limit: 2g
    cpus: 2

networks:
  little-coder-net:
    driver: bridge
