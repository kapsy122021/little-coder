version: '3.9'

services:
  # Terminal execution environment
  open-terminal:
    image: ghcr.io/open-webui/open-terminal:slim
    container_name: little-coder-terminal
    restart: unless-stopped
    # Bind to loopback only
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      OPEN_TERMINAL_API_KEY: ${OPEN_TERMINAL_API_KEY}
      OPEN_TERMINAL_MULTI_USER: "false"
    networks:
      - little-coder-net
    # Resource limits
    pids_limit: 256
    mem_limit: 2g
    cpus: 2
    depends_on:
      - little-coder-agent

  # Agent runtime environment
  little-coder-agent:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: little-coder-agent
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      # Inject terminal endpoint for agent to use
      OPEN_TERMINAL_URL: http://little-coder-terminal:8000
      OPEN_TERMINAL_API_KEY: ${OPEN_TERMINAL_API_KEY}
    networks:
      - little-coder-net
    # Resource limits
    pids_limit: 256
    mem_limit: 2g
    cpus: 2
    # Optional: mount project source for live reloading during development
    # volumes:
    #   - ../:/app

networks:
  little-coder-net:
    driver: bridge
