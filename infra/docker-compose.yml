name: little-coder

services:
  little-coder:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: little-coder
    restart: unless-stopped
    environment:
      # --- Route ALL file/shell tools to the open-terminal container ---
      LITTLE_CODER_USE_OPEN_TERMINAL: "1"
      OPEN_TERMINAL_URL: http://open-terminal:8000
      OPEN_TERMINAL_API_KEY: ${OPEN_TERMINAL_API_KEY}
      # --- Lock model provider to llama-ingress-proxy on the host ---
      # docker.models.json declares only qwen3.6:27b and qwen3.6:27b-nothink.
      LITTLE_CODER_MODELS_FILE: /app/docker.models.json
      LLAMACPP_BASE_URL: ${LLAMACPP_BASE_URL:-http://host.docker.internal:8000/v1}
      LLAMACPP_API_KEY: ${LLAMACPP_API_KEY:-noop}
    extra_hosts:
      # Required so `host.docker.internal` resolves on Linux engines;
      # harmless on Docker Desktop where it resolves natively.
      - "host.docker.internal:host-gateway"
    networks:
      - little-coder-net
    pids_limit: 256
    mem_limit: 2g
    cpus: 2
    depends_on:
      - open-terminal

  open-terminal:
    image: ghcr.io/open-webui/open-terminal:slim
    container_name: open-terminal
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      OPEN_TERMINAL_API_KEY: ${OPEN_TERMINAL_API_KEY}
      OPEN_TERMINAL_MULTI_USER: "false"
    volumes:
      # Persistent git credential vault — survives wipe-soft AND wipe-hard
      # because the files live on the host. Add/remove tokens by editing
      # infra/git/credentials on the host; changes take effect immediately
      # (no container restart needed). See infra/git/credentials.example.
      - ./git/gitconfig:/home/user/.gitconfig:ro
      - ./git/credentials:/home/user/.git-credentials:ro
    networks:
      - little-coder-net
    pids_limit: 256
    mem_limit: 2g
    cpus: 2

networks:
  little-coder-net:
    driver: bridge
