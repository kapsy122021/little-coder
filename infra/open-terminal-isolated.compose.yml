services:
  open-terminal:
    image: ghcr.io/open-webui/open-terminal:slim
    container_name: open-terminal
    restart: unless-stopped
    # Bind only on host loopback to avoid LAN exposure
    # Using port 8001 (8000 is already in use by llama-ingress-proxy)
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      OPEN_TERMINAL_API_KEY: ${OPEN_TERMINAL_API_KEY}
      OPEN_TERMINAL_MULTI_USER: "false"
    # Strict wipe by default: no persistent volume mounted.
    # If you need persistence, see "Persistent Variant" below.
    # Note: read_only, tmpfs, cap_drop, and seccomp are Linux-only features.
    # On Windows Docker, these are gracefully ignored. Security controls are
    # still enforced at the container runtime level on the WSL2 backend.
    networks:
      - ot-net
    # Resource limits work on all platforms
    pids_limit: 256
    mem_limit: 2g
    cpus: 2

networks:
  ot-net:
    driver: bridge
